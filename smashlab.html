<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>SmashLab — اطلب دلوقتي</title>
<style>
  html,body{height:100%;margin:0;font-family:'Segoe UI',Tahoma,sans-serif;background:#141414;color:#fff;display:flex;align-items:center;justify-content:center;text-align:center}
  .box{padding:24px;max-width:420px}
  .logo{font-size:30px;font-weight:900;letter-spacing:-.5px;color:#E2231A}
  .t{font-size:23px;font-weight:800;margin-top:18px;line-height:1.45}
  .s{font-size:15px;opacity:.72;margin-top:10px;line-height:1.6}
  .btn{display:block;margin:26px auto 0;background:#E2231A;color:#fff;text-decoration:none;
       font-size:20px;font-weight:800;padding:18px 26px;border-radius:14px;
       box-shadow:0 6px 22px rgba(226,35,26,.42);transition:transform .12s}
  .btn:active{transform:scale(.97)}
  .note{font-size:13px;opacity:.5;margin-top:16px}
</style>
<!-- TikTok Pixel -->
<script>
!function (w, d, t) {
  w.TiktokAnalyticsObject=t;var ttq=w[t]=w[t]||[];
  ttq.methods=["page","track","identify","instances","debug","on","off","once","ready","alias","group","enableCookie","disableCookie","holdConsent","revokeConsent","grantConsent"];
  ttq.setAndDefer=function(t,e){t[e]=function(){t.push([e].concat(Array.prototype.slice.call(arguments,0)))}};
  for(var i=0;i<ttq.methods.length;i++)ttq.setAndDefer(ttq,ttq.methods[i]);
  ttq.instance=function(t){for(var e=ttq._i[t]||[],n=0;n<ttq.methods.length;n++)ttq.setAndDefer(e,ttq.methods[n]);return e};
  ttq.load=function(e,n){var r="https://analytics.tiktok.com/i18n/pixel/events.js",o=n&&n.partner;ttq._i=ttq._i||{},ttq._i[e]=[],ttq._i[e]._u=r,ttq._t=ttq._t||{},ttq._t[e]=+new Date,ttq._o=ttq._o||{},ttq._o[e]=n||{};var s=document.createElement("script");s.type="text/javascript",s.async=!0,s.src=r+"?sdkid="+e+"&lib="+t;var a=document.getElementsByTagName("script")[0];a.parentNode.insertBefore(s,a)};
  ttq.load('D918EORC77U8BPLPP5FG');

}(window, document, 'ttq');
</script>
</head>
<body>
<div class="box">
  <div class="logo">SMASHLAB</div>
  <div class="t">أي سندوتش بـ 90 جنيه 🍔</div>
  <div class="s">دوس الزرار وابعتلنا طلبك على واتساب — هنرد عليك فورًا.</div>
  <a class="btn" id="order" href="#">اطلب دلوقتي على واتساب</a>
  <div class="note">التوصيل داخل القاهرة</div>
</div>
<script>
  var q = new URLSearchParams(location.search);
  var src = q.get('src') || 'tiktok';
  var phone = '201030080097';
  var text = encodeURIComponent('عايز أطلب من سماش لاب 🍔 (' + src + ')');
  var wa = 'https://wa.me/' + phone + '?text=' + text;

  var btn = document.getElementById('order');
  btn.href = wa;

  // Contact fires ONLY on a real tap — it must stay a measure of intent, not of page loads.
  var fired = false;
  btn.addEventListener('click', function () {
    if (!fired) {
      fired = true;
      try { ttq.track('Contact', { content_id: src, content_name: 'whatsapp_order' }); } catch (e) {}
    }
  });
</script>
</body>
</html>
